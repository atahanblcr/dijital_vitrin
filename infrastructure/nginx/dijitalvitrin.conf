server {
    listen 80;
    listen [::]:80;
    server_name dijitalvitrin.com *.dijitalvitrin.com;

    # Let's Encrypt için challenge dizini
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # HTTP'den HTTPS'e yönlendirme
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dijitalvitrin.com *.dijitalvitrin.com;

    # Wildcard SSL Sertifikaları
    ssl_certificate /etc/letsencrypt/live/dijitalvitrin.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dijitalvitrin.com/privkey.pem;

    # Güvenlik parametreleri
    include /etc/nginx/snippets/ssl-params.conf;

    # Backend API Yönlendirmesi
    location /api/ {
        proxy_pass http://localhost:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Storefront (Vitrin) Next.js Yönlendirmesi
    # Her subdomain (işletme.dijitalvitrin.com) buraya düşer. Next.js middleware slug'ı çözer.
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}

# Süper Admin ve İşletme Admin statik dosyaları
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.dijitalvitrin.com app.dijitalvitrin.com;

    ssl_certificate /etc/letsencrypt/live/dijitalvitrin.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dijitalvitrin.com/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;

    location / {
        # İstek "admin" subdomain'inden geliyorsa super-admin'i servis et, "app" ise işletme panelini.
        # Üretim ortamında bunlar vite build sonrasındaki klasörlere bakacak.
        root /var/www/dijital-vitrin/apps/$subdomain/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
